<body>
<div id="root"></div>
<script>
const {useState,useEffect,useCallback,useRef}=React;
const h=React.createElement;
const db=window._db;
const fmt=n=>(n<0?'-$':'$')+Math.abs(n).toLocaleString('zh-TW',{maximumFractionDigits:0});
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');};
const nowTime=()=>new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
let _uid=Date.now();
const uid=()=>String(++_uid);

function calcGP(it,revenue,qty){
  if(it.profitMode==='margin') return revenue*(it.profitValue/100);
  if(it.priceMode==='unit') return revenue-it.profitValue*(qty||0);
  return revenue*(1-it.profitValue/100);
}
function itemMeta(it){
  if(it.priceMode==='unit'){
    const gp=it.profitMode==='margin'?(it.unitPrice*it.profitValue/100):(it.unitPrice-it.profitValue);
    return {price:'$'+it.unitPrice+'/件',gpStr:'毛利 $'+Math.round(gp)};
  }
  const pct=it.profitMode==='margin'?it.profitValue:(100-it.profitValue);
  return {price:'售出金額',gpStr:'毛利率 '+pct+'%'};
}

// Firebase
async function fbSaveConfig(cfg){await db.collection('config').doc('current').set(cfg);}
async function fbLoadConfig(){const s=await db.collection('config').doc('current').get();return s.exists?s.data():null;}
async function fbSaveTodayTx(txs){await db.collection('days').doc(todayStr()).set({transactions:txs,updatedAt:Date.now()},{merge:true});}
async function fbLoadTodayTx(){const s=await db.collection('days').doc(todayStr()).get();return s.exists?(s.data().transactions||[]):[];}
async function fbSaveHistory(entry){await db.collection('history').doc(entry.date).set(entry);}
async function fbLoadHistory(){
  const s=await db.collection('history').get();
  const result=s.docs.map(d=>d.data()).sort((a,b)=>b.date.localeCompare(a.date));
  console.log('fbLoadHistory result:', result.length, 'records', result);
  return result;
}
function fbWatchTodayTx(cb){return db.collection('days').doc(todayStr()).onSnapshot(s=>{if(s.exists)cb(s.data().transactions||[]);});}

function PillToggle({options,value,onChange}){
  return h('div',{className:'ptog'},options.map(o=>h('button',{key:o.v,className:'pb'+(value===o.v?' on':''),onClick:()=>onChange(o.v)},o.l)));
}
function SyncBar({status}){
  const map={ok:'已同步',ing:'同步中…',err:'同步失敗'};
  if(!status||status==='idle')return null;
  return h('div',{className:'sync-bar'},h('div',{className:'sync-dot '+status}),h('span',null,map[status]||''));
}

// PAGE 1
function PageSetup({config,setConfig,goNext,syncStatus}){
  const {fixedCosts,items}=config;
  const [pastConfigs,setPastConfigs]=useState([]);
  useEffect(()=>{fbLoadHistory().then(h=>setPastConfigs(h.slice(0,5)));},[]);
  const setFixed=(id,f,v)=>setConfig(c=>({...c,fixedCosts:c.fixedCosts.map(r=>r.id===id?{...r,[f]:v}:r)}));
  const addFixed=()=>setConfig(c=>({...c,fixedCosts:[...c.fixedCosts,{id:uid(),name:'',amount:''}]}));
  const rmFixed=id=>setConfig(c=>({...c,fixedCosts:c.fixedCosts.filter(r=>r.id!==id)}));
  const setItem=(id,f,v)=>setConfig(c=>({...c,items:c.items.map(it=>it.id===id?{...it,[f]:v}:it)}));
  const setPM=(id,m)=>setConfig(c=>({...c,items:c.items.map(it=>it.id===id?{...it,priceMode:m}:it)}));
  const setProM=(id,m)=>setConfig(c=>({...c,items:c.items.map(it=>it.id===id?{...it,profitMode:m}:it)}));
  const addItem=()=>setConfig(c=>({...c,items:[...c.items,{id:uid(),name:'',priceMode:'unit',unitPrice:'',profitMode:'margin',profitValue:''}]}));
  const rmItem=id=>setConfig(c=>({...c,items:c.items.filter(it=>it.id!==id)}));
  const loadConfig=d=>{if(window.confirm('載入 '+d.date+' 的品項設定？')){setConfig({fixedCosts:(d.fixedCosts||[]).map(f=>({...f,id:uid()})),items:(d.items||[]).map(it=>({...it,id:uid()}))});}};
  return h('div',{className:'pg on'},
    h(SyncBar,{status:syncStatus}),
    h('div',{className:'fbox'},
      h('div',{className:'sec'},'固定費用'),
      fixedCosts.map(r=>h('div',{key:r.id,className:'frow'},
        h('input',{type:'text',placeholder:'費用名稱',value:r.name,onChange:e=>setFixed(r.id,'name',e.target.value)}),
        h('input',{type:'number',placeholder:'$0',value:r.amount,min:0,onChange:e=>setFixed(r.id,'amount',e.target.value)}),
        h('button',{className:'rm-btn',onClick:()=>rmFixed(r.id)},'×')
      )),
      h('button',{className:'add-row-btn',onClick:addFixed},'＋ 新增費用')
    ),
    h('div',{className:'sec'},'品項設定'),
    items.map(it=>h('div',{key:it.id,className:'icard'},
      h('div',{className:'icard-top'},
        h('input',{type:'text',value:it.name,placeholder:'品項名稱',style:{fontFamily:"'Noto Sans TC',sans-serif",fontSize:'.9rem'},onChange:e=>setItem(it.id,'name',e.target.value)}),
        h('button',{className:'rm-btn',onClick:()=>rmItem(it.id)},'×')
      ),
      h('div',{className:'icard-fields'},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
          h('div',{className:'fl',style:{marginBottom:0}},'計量方式'),
          h(PillToggle,{options:[{v:'unit',l:'件數'},{v:'amount',l:'售出金額'}],value:it.priceMode,onChange:m=>setPM(it.id,m)})
        ),
        it.priceMode==='unit'&&h('div',null,
          h('div',{className:'fl'},'單件售價 $'),
          h('input',{type:'number',value:it.unitPrice,placeholder:'0',min:0,onChange:e=>setItem(it.id,'unitPrice',e.target.value)})
        ),
        h('div',null,
          h('div',{className:'fl'},
            h('span',null,it.profitMode==='margin'?'毛利率 %':(it.priceMode==='unit'?'單件成本 $':'成本佔比 %')),
            h(PillToggle,{options:[{v:'cost',l:it.priceMode==='unit'?'成本$':'成本%'},{v:'margin',l:'毛利%'}],value:it.profitMode,onChange:m=>setProM(it.id,m)})
          ),
          h('input',{type:'number',value:it.profitValue,placeholder:it.profitMode==='cost'&&it.priceMode==='unit'?'0':'0-100',min:0,onChange:e=>setItem(it.id,'profitValue',e.target.value)})
        )
      )
    )),
    h('button',{className:'add-item-btn',onClick:addItem},'＋ 新增品項'),
    h('button',{className:'btn-primary',onClick:goNext},'開始收銀 →'),
    pastConfigs.length>0&&h('div',null,
      h('div',{className:'sec',style:{marginTop:20}},'載入過去設定'),
      h('div',{className:'saved-configs'},pastConfigs.map(d=>h('div',{key:d.date,className:'sc-row',onClick:()=>loadConfig(d)},
        h('div',{className:'sc-date'},d.date),
        h('div',{className:'sc-info'},(d.items||[]).length+' 個品項'),
        h('div',{className:'sc-load'},'載入')
      )))
    )
  );
}

// PAGE 2
function PageCashier({config,transactions,setTransactions,syncStatus}){
  const {items}=config;
  const [cart,setCart]=useState({});
  const getCart=id=>cart[id]||{selected:false,qty:1,amount:''};
  const updCart=(id,p)=>setCart(c=>({...c,[id]:{...getCart(id),...p}}));
  const totals=()=>{let rev=0,gp=0;transactions.forEach(tx=>tx.lines.forEach(l=>{const it=items.find(i=>i.id===l.itemId);if(!it)return;const itU={...it,unitPrice:parseFloat(it.unitPrice)||0,profitValue:parseFloat(it.profitValue)||0};const r=itU.priceMode==='unit'?itU.unitPrice*(l.qty||0):(l.amount||0);rev+=r;gp+=calcGP(itU,r,l.qty||0);}));return{rev,gp};};
  const subtotal=items.reduce((s,it)=>{const st=getCart(it.id);if(!st.selected)return s;return s+(it.priceMode==='unit'?(parseFloat(it.unitPrice)||0)*(st.qty||1):(parseFloat(st.amount)||0));},0);
  const commit=()=>{
    const lines=[];
    items.forEach(it=>{const st=getCart(it.id);if(!st.selected)return;lines.push(it.priceMode==='unit'?{itemId:it.id,qty:st.qty||1,amount:null}:{itemId:it.id,qty:null,amount:parseFloat(st.amount)||0});});
    if(!lines.length){alert('請先選擇品項');return;}
    setTransactions([...transactions,{id:uid(),lines,time:nowTime()}]);
    setCart({});
  };
  const delTx=id=>setTransactions(transactions.filter(t=>t.id!==id));
  const {rev,gp}=totals();
  const txLine=(tx,i)=>{
    let txRev=0,txGp=0;const parts=[];
    tx.lines.forEach(l=>{const it=items.find(i=>i.id===l.itemId);if(!it)return;const itU={...it,unitPrice:parseFloat(it.unitPrice)||0,profitValue:parseFloat(it.profitValue)||0};const r=itU.priceMode==='unit'?itU.unitPrice*(l.qty||0):(l.amount||0);txRev+=r;txGp+=calcGP(itU,r,l.qty||0);parts.push(it.priceMode==='unit'?(it.name||'未命名')+'×'+l.qty:(it.name||'未命名'));});
    return h('div',{key:tx.id,className:'txcard'},
      h('div',{className:'txn'},'#'+(i+1)),
      h('div',{className:'txc'},h('div',{className:'txi'},parts.join('、')),h('div',{className:'txa'},h('span',{className:'txr'},fmt(txRev)),h('span',{className:'txg'},'毛利 '+fmt(txGp)),h('span',{className:'txt2'},tx.time))),
      h('button',{className:'tx-del',onClick:()=>delTx(tx.id)},'✕')
    );
  };
  return h('div',{className:'pg on'},
    h(SyncBar,{status:syncStatus}),
    h('div',{className:'day-bar'},h('div',{className:'db'},h('div',{className:'db-l'},'今日營業額'),h('div',{className:'db-v'},fmt(rev))),h('div',{className:'db'},h('div',{className:'db-l'},'今日毛利'),h('div',{className:'db-v '+(gp>=0?'g':'r')},fmt(gp)))),
    h('div',{className:'tx-box'},
      h('div',{className:'tx-hd'},h('span',{className:'tx-hd-l'},'新增交易'),h('span',{className:'tx-sub'},'小計 '+fmt(subtotal))),
      h('div',{className:'picker'},items.map(it=>{
        const st=getCart(it.id);
        const meta=itemMeta({...it,unitPrice:parseFloat(it.unitPrice)||0,profitValue:parseFloat(it.profitValue)||0});
        return h('div',{key:it.id,className:'prow'+(st.selected?' sel':''),onClick:e=>{if(e.target.closest('.pctrl'))return;updCart(it.id,{selected:!st.selected});}},
          h('div',{className:'pchk'},st.selected?'✓':''),
          h('div',{className:'pinfo'},h('div',{className:'pname'},it.name||'未命名'),h('div',{className:'pmeta'},meta.price,h('span',{className:'gp'},meta.gpStr))),
          h('div',{className:'pctrl'},it.priceMode==='unit'
            ?h('div',{className:'qctrl'},h('button',{className:'qb m',onClick:()=>updCart(it.id,{qty:Math.max(1,(st.qty||1)-1)})},'−'),h('div',{className:'qdsp'},st.qty||1),h('button',{className:'qb p',onClick:()=>updCart(it.id,{qty:(st.qty||1)+1})},'＋'))
            :h('div',{className:'awt'},h('span',{className:'ds'},'$'),h('input',{type:'number',min:0,placeholder:'0',value:st.amount||'',style:{paddingLeft:14},onClick:e=>e.stopPropagation(),onChange:e=>updCart(it.id,{amount:e.target.value})}))
          )
        );
      })),
      h('button',{className:'done-btn',onClick:commit},'✓  完成交易')
    ),
    h('div',{className:'rec-hd'},h('span',{className:'rec-l'},'交易記錄'),h('span',{className:'rec-c'},transactions.length+' 筆')),
    transactions.length===0?h('div',{className:'empty'},'尚無交易記錄'):[...transactions].reverse().map((tx,ri)=>txLine(tx,transactions.length-ri-1))
  );
}

// PAGE 3
function PageSettle({config,transactions,onSave,syncStatus}){
  const {items,fixedCosts}=config;
  const [saved,setSaved]=useState(false);
  const [saving,setSaving]=useState(false);
  const calcAll=()=>{
    let rev=0,gp=0;const stat={};
    transactions.forEach(tx=>tx.lines.forEach(l=>{
      const it=items.find(i=>i.id===l.itemId);if(!it)return;
      const itU={...it,unitPrice:parseFloat(it.unitPrice)||0,profitValue:parseFloat(it.profitValue)||0};
      const r=itU.priceMode==='unit'?itU.unitPrice*(l.qty||0):(l.amount||0);
      rev+=r;const igp=calcGP(itU,r,l.qty||0);gp+=igp;
      if(!stat[l.itemId])stat[l.itemId]={rev:0,gp:0};
      stat[l.itemId].rev+=r;stat[l.itemId].gp+=igp;
    }));
    const fixed=fixedCosts.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
    return{rev,gp,fixed,net:gp-fixed,stat};
  };
  const {rev,gp,fixed,net,stat}=calcAll();
  const margin=rev>0?(net/rev*100):0;
  const doSave=async()=>{
    setSaving(true);
    try{
      const entry={date:todayStr(),fixedCosts,items,transactions,rev,gp,net};
      await fbSaveHistory(entry);
      setSaved(true);
      await onSave();
    }catch(e){console.error(e);}
    setSaving(false);
  };
  return h('div',{className:'pg on'},
    h(SyncBar,{status:syncStatus}),
    h('div',{style:{fontFamily:"'Space Mono',monospace",fontSize:'.65rem',color:'var(--t3)',textAlign:'center',marginBottom:14}},todayStr()),
    h('div',{className:'settle-box'},h('div',{className:'sb-l'},'當日淨利'),h('div',{className:'sb-v '+(net<0?'neg':'')},fmt(net)),h('div',{className:'sb-m'},'淨利率 '+margin.toFixed(1)+'%')),
    h('div',{className:'stbl'},
      h('div',{className:'sr'},h('span',{className:'lb'},'營業額'),h('span',{className:'vl'},fmt(rev))),
      h('div',{className:'sr'},h('span',{className:'lb'},'毛利'),h('span',{className:'vl',style:{color:'var(--grn)'}},fmt(gp))),
      fixedCosts.filter(r=>parseFloat(r.amount)>0).map(r=>h('div',{key:r.id,className:'sr'},h('span',{className:'lb'},r.name||'固定費用'),h('span',{className:'vl',style:{color:'var(--red)'}},'-'+fmt(parseFloat(r.amount)||0)))),
      h('div',{className:'sr tot'},h('span',{className:'lb'},'淨利'),h('span',{className:'vl',style:{color:net>=0?'var(--grn)':'var(--red)'}},fmt(net)))
    ),
    h('div',{className:'sec'},'品項統計'),
    h('div',{className:'sitems'},
      h('div',{className:'sih'},h('span',null,'品項'),h('span',{className:'r'},'小計'),h('span',{className:'r'},'毛利')),
      items.map(it=>{const s=stat[it.id]||{rev:0,gp:0};return h('div',{key:it.id,className:'srow'},h('div',{className:'nm'},it.name||'未命名'),h('div',{className:'mn '+(s.rev===0?'z':'')},fmt(s.rev)),h('div',{className:'mn '+(s.gp>0?'gp':s.gp===0?'z':'')},fmt(s.gp)));})
    ),
    saved
      ?h('div',{style:{textAlign:'center',color:'var(--grn)',fontSize:'.85rem',padding:'12px 0',fontWeight:700}},'✓ 已儲存至雲端')
      :h('button',{className:'btn-primary',onClick:doSave,disabled:saving},saving?'儲存中…':'儲存今日記錄 ☁')
  );
}

// PAGE 4
function PageHistory({active,histKey}){
  const [open,setOpen]=useState({});
  const [copied,setCopied]=useState(null);
  const [history,setHistory]=useState([]);
  const [loading,setLoading]=useState(true);

  const loadData=()=>{
    setLoading(true);
    fbLoadHistory().then(list=>{setHistory(list);setLoading(false);}).catch(()=>setLoading(false));
  };

  useEffect(()=>{if(active)loadData();},[active,histKey]);

  const totalRev=history.reduce((s,d)=>s+(d.rev||0),0);
  const totalNet=history.reduce((s,d)=>s+(d.net||0),0);

  function buildCopy(d){
    const margin=d.rev>0?(d.net/d.rev*100):0;
    const fl=(d.fixedCosts||[]).filter(r=>parseFloat(r.amount)>0);
    const stat={};
    (d.transactions||[]).forEach(tx=>tx.lines.forEach(l=>{
      const it=(d.items||[]).find(i=>i.id===l.itemId);if(!it)return;
      const r=it.priceMode==='unit'?(parseFloat(it.unitPrice)||0)*(l.qty||0):(l.amount||0);
      if(!stat[l.itemId])stat[l.itemId]={name:it.name||'?',rev:0};
      stat[l.itemId].rev+=r;
    }));
    const se=Object.values(stat).filter(s=>s.rev>0);
    let lines=[d.date,'營業額 '+fmt(d.rev||0)+'　淨利 '+fmt(d.net||0)+'（'+margin.toFixed(0)+'%）'];
    if(fl.length>0)lines.push(fl.map(r=>(r.name||'費用')+' -'+fmt(parseFloat(r.amount)||0)).join('　'));
    if(se.length>0){lines.push('');se.forEach(s=>lines.push('· '+s.name+'　'+fmt(s.rev)));}
    const txs=d.transactions||[];
    if(txs.length>0){lines.push('');txs.forEach(tx=>{const parts=[];let txRev=0;tx.lines.forEach(l=>{const it=(d.items||[]).find(i=>i.id===l.itemId);if(!it)return;txRev+=it.priceMode==='unit'?(parseFloat(it.unitPrice)||0)*(l.qty||0):(l.amount||0);parts.push(it.priceMode==='unit'?(it.name||'?')+'×'+l.qty:(it.name||'?'));});lines.push((tx.time||'--:--')+'  '+parts.join(' ')+'  '+fmt(txRev));});}
    return lines.join('\n');
  }

  function copyDay(d,e){
    e.stopPropagation();
    const text=buildCopy(d);
    const done=()=>{setCopied(d.date);setTimeout(()=>setCopied(null),2000);};
    navigator.clipboard.writeText(text).then(done).catch(()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();});
  }

  if(!active)return null;
  if(loading)return h('div',{className:'pg on'},h('div',{className:'empty'},'載入中…'));

  return h('div',{className:'pg on'},
    h('div',{className:'sec'},'累計統計'),
    h('div',{className:'hist-summary'},
      h('div',{className:'hs'},h('div',{className:'hs-l'},'天數'),h('div',{className:'hs-v'},history.length+'天')),
      h('div',{className:'hs'},h('div',{className:'hs-l'},'總營業額'),h('div',{className:'hs-v'},fmt(totalRev))),
      h('div',{className:'hs'},h('div',{className:'hs-l'},'總淨利'),h('div',{className:'hs-v '+(totalNet>=0?'g':'')},fmt(totalNet)))
    ),
    h('div',{className:'sec'},'每日記錄'),
    history.length===0
      ?h('div',{className:'no-hist'},'尚無歷史記錄\n在結算頁按「儲存今日記錄」')
      :history.map(d=>{
        const isOpen=open[d.date];
        return h('div',{key:d.date,className:'hday'+(isOpen?' open':'')},
          h('div',{className:'hday-hd',onClick:()=>setOpen(o=>({...o,[d.date]:!o[d.date]}))},
            h('div',{className:'hday-date'},d.date),
            h('div',{className:'hday-rev'},fmt(d.rev||0)),
            h('div',{className:'hday-net '+(d.net>=0?'g':'r')},fmt(d.net||0)),
            h('span',{className:'hday-arrow'},'▼')
          ),
          isOpen&&h('div',{className:'hday-body'},
            h('button',{className:'copy-btn',onClick:e=>copyDay(d,e)},copied===d.date?'✓ 已複製':'📋 複製結算報告'),
            h('div',{className:'sec',style:{marginBottom:8,marginTop:12}},'交易明細'),
            (d.transactions||[]).length===0
              ?h('div',{style:{fontSize:'.76rem',color:'var(--t3)',padding:'4px 0'}},'無記錄')
              :(d.transactions||[]).map((tx,i)=>{
                const parts=[];let txRev=0;
                tx.lines.forEach(l=>{const it=(d.items||[]).find(i=>i.id===l.itemId);if(!it)return;txRev+=it.priceMode==='unit'?(parseFloat(it.unitPrice)||0)*(l.qty||0):(l.amount||0);parts.push(it.priceMode==='unit'?(it.name||'?')+'×'+l.qty:(it.name||'?'));});
                return h('div',{key:tx.id||i,className:'hday-txrow'},h('span',{className:'ti'},'#'+(i+1)+' '+parts.join('、')),h('span',{className:'tv'},fmt(txRev)));
              })
          )
        );
      })
  );
}

// APP
function App(){
  const defConfig={fixedCosts:[{id:uid(),name:'攤位費',amount:''}],items:[{id:uid(),name:'',priceMode:'unit',unitPrice:'',profitMode:'margin',profitValue:''}]};
  const [tab,setTab]=useState(0);
  const [config,setConfigRaw]=useState(defConfig);
  const [transactions,setTxRaw]=useState([]);
  const [syncStatus,setSyncStatus]=useState('ing');
  const saveTimer=useRef(null);

  useEffect(()=>{
    (async()=>{
      try{
        const [cfg,txs]=await Promise.all([fbLoadConfig(),fbLoadTodayTx()]);
        if(cfg)setConfigRaw(cfg);
        if(txs.length)setTxRaw(txs);
        setSyncStatus('ok');
      }catch(e){console.error(e);setSyncStatus('err');}
    })();
  },[]);

  useEffect(()=>{
    const unsub=fbWatchTodayTx(txs=>setTxRaw(txs));
    return unsub;
  },[]);

  const setConfig=v=>{
    const next=typeof v==='function'?v(config):v;
    setConfigRaw(next);
    clearTimeout(saveTimer.current);
    setSyncStatus('ing');
    saveTimer.current=setTimeout(async()=>{
      try{await fbSaveConfig(next);setSyncStatus('ok');}
      catch{setSyncStatus('err');}
    },1500);
  };

  const setTransactions=async txs=>{
    setTxRaw(txs);
    setSyncStatus('ing');
    try{await fbSaveTodayTx(txs);setSyncStatus('ok');}
    catch{setSyncStatus('err');}
  };

  const [histKey,setHistKey]=useState(0);

  const onSave=async()=>{
    await fbSaveTodayTx([]);
    setTxRaw([]);
    setHistKey(k=>k+1);
  };

  const tabs=['設定','收銀','結算','歷史'];
  return h('div',null,
    h('div',{className:'nav'},tabs.map((t,i)=>h('button',{key:i,className:'ntab'+(tab===i?' on':''),onClick:()=>setTab(i)},h('span',{className:'sn'},'0'+(i+1)),t))),
    tab===0&&h(PageSetup,{config,setConfig,goNext:()=>setTab(1),syncStatus}),
    tab===1&&h(PageCashier,{config,transactions,setTransactions,syncStatus}),
    tab===2&&h(PageSettle,{config,transactions,onSave,syncStatus}),
    h(PageHistory,{active:tab===3,histKey})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
